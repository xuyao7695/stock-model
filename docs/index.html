<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>投资模型</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:#0d1117;color:#e6edf3;padding:12px;padding-bottom:60px}
a{color:#58a6ff;text-decoration:none}
.top{display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px}
.title{font-size:20px;font-weight:700}
.meta{font-size:11px;color:#8b949e}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:12px;margin-bottom:10px}
.ch{display:flex;justify-content:space-between;align-items:baseline}
.nm{font-size:17px;font-weight:700}
.sc{font-size:13px;color:#d29922}
.tag{font-size:11px;color:#8b949e;margin:4px 0 8px}
.row{display:flex;gap:6px;margin:6px 0}
.pill{flex:1;background:#0d1117;border-radius:8px;padding:6px;text-align:center;font-size:11px}
.pill b{display:block;font-size:14px}
.pos{color:#3fb950}.neg{color:#f85149}.warn{color:#d29922}
.disc{font-size:11px;color:#8b949e;margin-top:6px;line-height:1.5}
.nav{position:fixed;bottom:0;left:0;right:0;background:#161b22;border-top:1px solid #30363d;display:flex;padding:8px 0;z-index:100}
.nav a{flex:1;text-align:center;font-size:12px;color:#8b949e;padding:4px}
.nav a.active{color:#58a6ff}
.riskbar{display:flex;gap:4px;margin:8px 0}
.rk{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:4px 6px;font-size:10px;text-align:center;flex:1}
.rk b{display:block;font-size:13px;color:#58a6ff}
.timeline{margin:8px 0}
.tl-item{display:flex;gap:8px;padding:8px;background:#161b22;border-radius:8px;margin-bottom:6px;align-items:center;cursor:pointer}
.tl-date{font-size:14px;font-weight:700;min-width:50px}
.tl-info{font-size:11px;color:#8b949e;flex:1}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px}
.b-green{background:#1a3a2a;color:#3fb950}.b-gray{background:#21262d;color:#8b949e}.b-red{background:#3a1a1a;color:#f85149}
.empty{text-align:center;color:#8b949e;padding:40px 20px;font-size:14px}
.btn{display:block;width:100%;background:#238636;color:#fff;border:none;border-radius:8px;padding:12px;font-size:16px;font-weight:600;text-align:center;margin:8px 0}
.btn2{background:#21262d;color:#58a6ff;border:1px solid #30363d}
.cmp{display:flex;gap:4px;font-size:12px;padding:4px 0;border-bottom:1px solid #21262d}
.cmp div{flex:1;text-align:center}
.cmp-h{color:#8b949e;font-size:11px}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;padding:20px;overflow-y:auto}
.modal-content{background:#161b22;border-radius:12px;padding:16px;margin-top:20px}
.section-h{font-size:15px;font-weight:700;margin:12px 0 6px}
input,select,textarea{width:100%;background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:8px;padding:10px;font-size:16px;margin:4px 0 8px}
textarea{min-height:60px}
label{font-size:13px;color:#8b949e;display:block;margin:4px 0 2px}
</style>
</head>
<body>

<div class="top">
  <div class="title" id="page-title">📈 投资模型</div>
  <div class="meta" id="page-meta">加载中...</div>
</div>

<div id="app-content"></div>

<div class="nav">
  <a href="#" onclick="showPage('home');return false" id="nav-home">🏠 首页</a>
  <a href="#" onclick="showPage('record');return false" id="nav-record">📝 录入</a>
  <a href="#" onclick="showPage('stats');return false" id="nav-stats">📊 统计</a>
  <a href="#" onclick="showPage('history');return false" id="nav-history">📜 历史</a>
  <a href="#" onclick="showPage('rules');return false" id="nav-rules">⚙️ 规则</a>
</div>

<script>
let BUNDLE = null;
let PORTFOLIO = null;
let REC_STATS = null;
let CURRENT_DATE = null;

async function loadData() {
  // GitHub Pages: 数据在 docs/data/bundle.json
  // 加时间戳防缓存
  const ts = '?t=' + Date.now();
  try {
    const [bundleResp, portResp, statsResp] = await Promise.all([
      fetch('./data/bundle.json' + ts),
      fetch('./data/portfolio.json' + ts).catch(() => null),
      fetch('./data/recommendation_stats.json' + ts).catch(() => null),
    ]);
    BUNDLE = await bundleResp.json();
    if (portResp && portResp.ok) PORTFOLIO = await portResp.json();
    if (statsResp && statsResp.ok) REC_STATS = await statsResp.json();
    document.getElementById('page-meta').textContent = '更新于 ' + BUNDLE.generated_at;
    showPage('home');
  } catch(e) {
    document.getElementById('app-content').innerHTML = '<div class="empty">数据加载失败<br>' + e.message + '<br><br>首次使用请先运行扫描</div>';
  }
}

function showPage(page) {
  // 更新导航高亮
  ['home','record','stats','history','rules'].forEach(p => {
    document.getElementById('nav-'+p).classList.toggle('active', p === page);
  });
  const content = document.getElementById('app-content');
  if (page === 'home') content.innerHTML = renderHome();
  else if (page === 'record') content.innerHTML = renderRecord();
  else if (page === 'stats') content.innerHTML = renderStats();
  else if (page === 'history') content.innerHTML = renderHistory();
  else if (page === 'rules') content.innerHTML = renderRules();
  window.scrollTo(0, 0);
}

function renderHome() {
  if (!BUNDLE) return '<div class="empty">数据加载中...</div>';
  const r = BUNDLE.rules || {};
  // 10 天时间线
  let tl = '';
  BUNDLE.history_10days.forEach(h => {
    const scBadge = h.has_scan ? `<span class="badge b-green">${h.advice_count||h.scan_count}只</span>` : '<span class="badge b-gray">无</span>';
    const trBadge = h.has_trades ? `<span class="badge b-green">${h.trade_count}笔</span>` : '';
    tl += `<div class="tl-item" onclick="showDay('${h.date}')"><div class="tl-date">${h.date.slice(5)}</div><div class="tl-info">周${h.weekday} ${scBadge} ${trBadge}</div></div>`;
  });
  // 当天候选
  const todayDetail = BUNDLE.days_detail.find(d => d.date === BUNDLE.today) || BUNDLE.days_detail[0];
  const advices = todayDetail ? todayDetail.advices : [];
  let cards = '';
  if (!advices || advices.length === 0) {
    cards = '<div class="empty">今天还没有扫描数据<br>GitHub Actions 每天 9:25 自动扫描</div>';
  } else {
    advices.slice(0, 15).forEach(c => {
      cards += `<div class="card">
        <div class="ch"><div class="nm">${c.name} <span style="font-size:12px;color:#8b949e">${c.code||''}</span></div><div class="sc">分${(c.score||0).toFixed(2)}</div></div>
        <div class="tag">${c.path||''} ｜ 连板${c.zt_count||0} ｜ ${c.industry||''}</div>
        <div class="row">
          <div class="pill">仓位<b class="pos">${Math.round((c.pos_pct||0)*100)}%</b></div>
          <div class="pill">止损<b class="neg">${Math.round((c.stop_pct||-8)*100)}%</b></div>
          <div class="pill">目标<b class="pos">+${Math.round((c.target_pct||15)*100)}%</b></div>
          <div class="pill">持仓<b>${c.max_hold_days||10}天</b></div>
        </div>
        <div class="disc">${(c.discipline||[]).join(' · ')}</div>
      </div>`;
    });
  }
  return `
    <div class="meta">最近10天 · 点日期查看详情</div>
    <div class="timeline">${tl}</div>
    <div class="section-h">⚡ 今日候选（${advices.length}只）</div>
    <div class="riskbar">
      <div class="rk">单只<b>${Math.round((r.max_single_position||0.3)*100)}%</b></div>
      <div class="rk">总仓<b>${Math.round((r.max_total_position||0.8)*100)}%</b></div>
      <div class="rk">熔断<b>${Math.round((r.daily_loss_circuit_breaker||-0.05)*100)}%</b></div>
      <div class="rk">日笔<b>${r.max_daily_trades||3}</b></div>
    </div>
    ${cards}
  `;
}

function showDay(date) {
  CURRENT_DATE = date;
  const day = BUNDLE.days_detail.find(d => d.date === date);
  if (!day) return;
  document.getElementById('page-title').textContent = '📅 ' + date;
  const advices = day.advices || [];
  const trades = day.trades || [];
  let cards = '';
  advices.forEach(c => {
    cards += `<div class="card">
      <div class="ch"><div class="nm">${c.name}</div><div class="sc">分${(c.score||0).toFixed(2)}</div></div>
      <div class="tag">${c.path||''} ｜ 连板${c.zt_count||0} ｜ ${c.industry||''}</div>
      <div class="row">
        <div class="pill">仓位<b class="pos">${Math.round((c.pos_pct||0)*100)}%</b></div>
        <div class="pill">止损<b class="neg">${Math.round((c.stop_pct||-8)*100)}%</b></div>
        <div class="pill">目标<b class="pos">+${Math.round((c.target_pct||15)*100)}%</b></div>
      </div>
    </div>`;
  });
  let tradeHtml = '';
  if (trades.length > 0) {
    trades.forEach(t => {
      const pnl = parseFloat(t.pnl||0);
      const cls = pnl >= 0 ? 'pos' : 'neg';
      tradeHtml += `<div class="card">
        <div class="ch"><div class="nm">${t.name||''}</div><div class="sc ${cls}">${pnl>0?'+':''}${pnl.toFixed(0)}</div></div>
        <div class="tag">${t.action||''} ｜ ${t.qty||''}股 ｜ ${t.price||''}元 ｜ ${t.time||''}</div>
        <div class="disc">${t.reason||''}</div>
      </div>`;
    });
  } else {
    tradeHtml = '<div class="empty">当天无操作记录</div>';
  }
  document.getElementById('app-content').innerHTML = `
    <div class="meta">${date} 详情 · 涨停${day.total_zt||0}只</div>
    <div class="section-h">📋 系统建议（${advices.length}只）</div>
    ${cards}
    <div class="section-h">✋ 实际操作（${trades.length}笔）</div>
    ${tradeHtml}
    <button class="btn2" style="width:100%;padding:12px;border-radius:8px;margin:8px 0" onclick="showPage('home')">← 返回首页</button>
  `;
  // 恢复标题
  setTimeout(() => { document.getElementById('page-title').textContent = '📈 投资模型'; }, 100);
}

function renderRecord() {
  const today = BUNDLE ? BUNDLE.today : new Date().toISOString().slice(0,10);
  return `
    <div class="meta">录入实际操作 · ${today}</div>
    <div class="card">
      <div class="tag">⚠️ 静态版不支持在线录入。<br><br>
      <b>使用方式：</b><br>
      1. 复制下方模板<br>
      2. 填好后发给你的 AI 助手 / 企业微信<br>
      3. 或手动记录到 Excel，定期导入</div>
    </div>
    <div class="card">
      <label>操作</label>
      <select id="r-action">
        <option value="证券买入">买入</option>
        <option value="证券卖出">卖出</option>
      </select>
      <label>标的名称</label>
      <input id="r-name" placeholder="如 光库科技">
      <label>代码</label>
      <input id="r-code" placeholder="如 300620">
      <label>价格</label>
      <input id="r-price" type="number" step="0.01" placeholder="成交价">
      <label>数量（股）</label>
      <input id="r-qty" type="number" placeholder="如 100">
      <label>盈亏（卖出时填）</label>
      <input id="r-pnl" type="number" step="0.01" placeholder="盈利+ 亏损-">
      <label>买入理由</label>
      <textarea id="r-reason" placeholder="为什么买？预期赚多少？止损位？"></textarea>
      <button class="btn" onclick="exportRecord()">📋 生成记录文本</button>
    </div>
    <div id="export-result"></div>
  `;
}

function exportRecord() {
  const data = {
    date: BUNDLE ? BUNDLE.today : new Date().toISOString().slice(0,10),
    action: document.getElementById('r-action').value,
    name: document.getElementById('r-name').value,
    code: document.getElementById('r-code').value,
    price: parseFloat(document.getElementById('r-price').value || 0),
    qty: parseInt(document.getElementById('r-qty').value || 0),
    pnl: parseFloat(document.getElementById('r-pnl').value || 0),
    reason: document.getElementById('r-reason').value,
    time: new Date().toTimeString().slice(0,5),
  };
  const text = JSON.stringify(data, null, 2);
  document.getElementById('export-result').innerHTML = `<div class="card"><div class="tag">复制以下文本保存：</div><pre style="white-space:pre-wrap;font-size:12px;color:#e6edf3;background:#0d1117;padding:8px;border-radius:8px">${text}</pre></div>`;
}

function renderHistory() {
  if (!BUNDLE) return '<div class="empty">加载中</div>';
  let items = '';
  BUNDLE.history_10days.forEach(h => {
    items += `<div class="tl-item" onclick="showDay('${h.date}')"><div class="tl-date">${h.date.slice(5)}</div><div class="tl-info">周${h.weekday} ｜ 建议${h.scan_count}只 ｜ 操作${h.trade_count}笔</div></div>`;
  });
  return `<div class="meta">最近10天历史 · 永久存档于 GitHub</div><div class="timeline">${items}</div>`;
}

function renderStats() {
  let html = '<div class="meta">盈亏汇总 + 推荐统计</div>';

  // 盈亏汇总
  if (PORTFOLIO && PORTFOLIO.total_trades > 0) {
    const p = PORTFOLIO;
    const pnlCls = p.cumulative_pnl >= 0 ? 'pos' : 'neg';
    html += `<div class="section-h">💰 盈亏汇总</div>`;
    html += `<div class="riskbar">
      <div class="rk">总交易<b>${p.total_trades}</b></div>
      <div class="rk">已配对<b>${p.realized_count}</b></div>
      <div class="rk">累计盈亏<b class="${pnlCls}">${p.cumulative_pnl>0?'+':''}${p.cumulative_pnl.toFixed(0)}</b></div>
    </div>`;
    // 月度
    if (p.monthly && p.monthly.length > 0) {
      html += `<div class="section-h">📅 月度统计</div>`;
      p.monthly.forEach(m => {
        const cls = m.pnl >= 0 ? 'pos' : 'neg';
        html += `<div class="card">
          <div class="ch"><div class="nm">${m.month}</div><div class="sc ${cls}">${m.pnl>0?'+':''}${m.pnl.toFixed(0)}</div></div>
          <div class="tag">${m.wins}胜${m.losses}负 ｜ 胜率${m.win_rate}% ｜ 共${m.total}笔</div>
        </div>`;
      });
    }
    // 当前持仓
    if (p.current_holdings && p.current_holdings.length > 0) {
      html += `<div class="section-h">📦 当前持仓</div>`;
      p.current_holdings.forEach(h => {
        html += `<div class="card">
          <div class="ch"><div class="nm">${h.name}</div><div class="sc">${h.qty}股</div></div>
          <div class="tag">均价 ${h.avg_cost} ｜ 成本 ${h.cost_total}</div>
        </div>`;
      });
    }
    // 最近已实现
    if (p.recent_realized && p.recent_realized.length > 0) {
      html += `<div class="section-h">📋 最近成交（${p.recent_realized.length}笔）</div>`;
      p.recent_realized.slice(-10).reverse().forEach(r => {
        const cls = r.pnl >= 0 ? 'pos' : 'neg';
        html += `<div class="card">
          <div class="ch"><div class="nm">${r.name}</div><div class="sc ${cls}">${r.pnl>0?'+':''}${r.pnl.toFixed(0)}</div></div>
          <div class="tag">${r.buy_date}买 ${r.sell_date}卖 ｜ ${r.qty}股 ｜ ${r.buy_price}→${r.sell_price}</div>
        </div>`;
      });
    }
  } else {
    html += `<div class="card"><div class="empty">暂无实际操作记录<br>到「录入」页记录你的买卖</div></div>`;
  }

  // 推荐涨跌统计
  if (REC_STATS && REC_STATS.summary && REC_STATS.summary.total > 0) {
    html += `<div class="section-h">📈 推荐后涨跌统计</div>`;
    const s = REC_STATS.summary;
    html += `<div class="card"><div class="tag">总推荐 ${s.total} 只</div></div>`;
    if (s.by_period) {
      Object.entries(s.by_period).forEach(([period, d]) => {
        const cls = d.avg_return >= 0 ? 'pos' : 'neg';
        const label = {1:'次日',3:'3日',5:'5日',10:'10日'}[period] || period;
        html += `<div class="card">
          <div class="ch"><div class="nm">${label}后</div><div class="sc ${cls}">${d.avg_return>0?'+':''}${d.avg_return}%</div></div>
          <div class="tag">胜率 ${d.win_rate}% ｜ 样本 ${d.count} 只</div>
        </div>`;
      });
    }
  } else {
    html += `<div class="card"><div class="empty">推荐统计需积累数据<br>每天扫描后自动更新，约 3 天后可见</div></div>`;
  }

  return html;
}

function renderRules() {
  if (!BUNDLE || !BUNDLE.rules) return '<div class="empty">规则加载中</div>';
  const r = BUNDLE.rules;
  return `
    <div class="meta">风控规则 · 编辑 screener/rules.json 修改</div>
    <div class="card">
      <div class="ch"><div class="nm">单只仓位上限</div><div class="sc">${Math.round(r.max_single_position*100)}%</div></div>
    </div>
    <div class="card">
      <div class="ch"><div class="nm">总仓位上限</div><div class="sc">${Math.round(r.max_total_position*100)}%</div></div>
    </div>
    <div class="card">
      <div class="ch"><div class="nm">日亏熔断</div><div class="sc neg">${Math.round(r.daily_loss_circuit_breaker*100)}%</div></div>
    </div>
    <div class="card">
      <div class="ch"><div class="nm">单笔硬止损</div><div class="sc neg">${Math.round(r.max_single_loss*100)}%</div></div>
    </div>
    <div class="card">
      <div class="ch"><div class="nm">最小盈亏比</div><div class="sc">${r.min_risk_reward}</div></div>
    </div>
    <div class="card">
      <div class="ch"><div class="nm">日最大交易笔数</div><div class="sc">${r.max_daily_trades}</div></div>
    </div>
    <div class="card">
      <div class="ch"><div class="nm">最大持仓天数</div><div class="sc">${r.max_holding_days}天</div></div>
    </div>
    <div class="card">
      <div class="disc">
        <b>交易纪律</b><br>
        ⛔ 单只 ≤ 建议仓位，总仓 ≤ 80%<br>
        �� 硬止损到价无条件砍，不补仓<br>
        🎯 目标价或题材退潮即走<br>
        ⏱ 最大持仓天数到期强制复盘<br>
        📝 买入前写一句理由，不写不买<br>
        🔥 今日已亏 -5% 熔断 → 关 APP
      </div>
    </div>
  `;
}

// 启动
loadData();
</script>
</body>
</html>
